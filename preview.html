<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="CV Listo | Generá tu CV profesional en minutos" />
    <meta property="og:description" content="Pagás, cargás tus datos y descargás tu CV A4 al instante. Desde $10.000." />
    <meta property="og:image" content="https://servicio-cv.pages.dev/og-image.png" />
    <meta property="og:url" content="https://servicio-cv.pages.dev/" />
    <title>Vista previa | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="preview-layout">
        <aside class="audit-panel">
          <p class="eyebrow">Vista previa</p>
          <h1>Revisá antes de generar</h1>
          <p>La generación final es única. Si hay advertencias, volvé al formulario y corregí antes de confirmar.</p>
          <div id="a4-status" class="a4-status">Verificando formato A4...</div>
          <div id="audit-list"></div>
          <div class="quick-edit">
            <h2>Edición rápida</h2>
            <label>Perfil<textarea id="quick-summary" rows="3"></textarea></label>
            <label>Experiencia<textarea id="quick-experience" rows="4"></textarea></label>
            <label>Habilidades<textarea id="quick-skills" rows="3"></textarea></label>
            <button class="button secondary" id="refresh-preview" type="button">Actualizar vista</button>
          </div>
          <div class="app-actions">
            <a class="button secondary" id="edit-link" href="#">Editar datos</a>
            <button class="button primary" id="generate-btn">Generar CV final</button>
          </div>
        </aside>
        <section id="cv-preview" class="cv-preview"></section>
      </section>
    </main>
    <script src="./app.js"></script>
    <script>
      const orderId = CVListo.getParam("order");
      const token = CVListo.getParam("token");
      let order = CVListo.getOrder(orderId);

      async function loadPreview() {
        if (!order && orderId && token) {
          try {
            const backendOrder = await CVListo.fetchBackendOrder(orderId, token);
            order = CVListo.cacheOrder(backendOrder);
          } catch {
            // Sin backend disponible.
          }
        }

        if (!order || order.token !== token || order.status !== "preview_ready") {
          document.body.innerHTML = "<main class='app-shell'><h1>Vista previa no disponible</h1><p>Completá el formulario para generar la vista previa.</p><a class='button primary' href='./index.html#planes'>Volver</a></main>";
          return;
        }

        document.querySelector("#edit-link").href = `./formulario.html?order=${order.id}&token=${order.token}`;
        const render = () => {
          document.querySelector("#cv-preview").innerHTML = CVListo.buildResumeHtml(order.data);
        };
        document.querySelector("#quick-summary").value = order.data.summary || "";
        document.querySelector("#quick-experience").value = order.data.experiences?.[0]?.tasks || order.data.experience || "";
        document.querySelector("#quick-skills").value = order.data.skills || "";
        render();
        const list = document.querySelector("#audit-list");
        const reports = order.reports || [];
        const updateA4Status = () => {
          const cvPage = document.querySelector(".cv-page");
          const status = document.querySelector("#a4-status");
          if (!cvPage || !status) return;
          const overflow = cvPage.scrollHeight > cvPage.clientHeight + 8 || cvPage.scrollWidth > cvPage.clientWidth + 8;
          status.className = `a4-status ${overflow ? "warning" : "ok"}`;
          status.textContent = overflow ? "Puede exceder una página A4. Revisá textos largos." : "Formato A4 correcto en la vista previa.";
          return overflow;
        };
        if (updateA4Status()) {
          reports.push({ severity: "warning", message: "La vista previa podría exceder una página A4. Revisá longitud de textos antes de generar." });
        }
        list.innerHTML = reports.length
          ? reports.map((report) => `<p class="audit ${report.severity}">${report.message}</p>`).join("")
          : "<p class='audit ok'>Sin errores bloqueantes detectados.</p>";

        document.querySelector("#refresh-preview").addEventListener("click", async () => {
          order.data.summary = document.querySelector("#quick-summary").value;
          order.data.experience = document.querySelector("#quick-experience").value;
          if (order.data.experiences?.length) {
            order.data.experiences[0].tasks = order.data.experience;
          }
          order.data.skills = document.querySelector("#quick-skills").value;
          CVListo.updateOrder(order.id, { data: order.data });
          try {
            await CVListo.saveBackendProfile(order.id, order.token, order.data, order.reports || []);
          } catch {
            // Sin backend disponible.
          }
          render();
          updateA4Status();
        });

        document.querySelector("#generate-btn").addEventListener("click", async () => {
          try {
            const validation = await CVListo.validateBackendProfile(order.planId, order.data);
            order.reports = validation.reports || [];
            CVListo.updateOrder(order.id, { reports: order.reports });
          } catch {
            // Sin backend disponible: usamos validaciones locales existentes.
          }

          const hasCritical = (order.reports || []).some((report) => report.severity === "critical");
          if (hasCritical) {
            alert("Hay errores obligatorios. Corregilos antes de generar.");
            window.location.reload();
            return;
          }
          if (!confirm("La generación final se puede hacer una sola vez. ¿Confirmás que revisaste los datos?")) {
            return;
          }
          const contentHash = await CVListo.sha256(JSON.stringify(order.data));
          try {
            await CVListo.finalizeBackendOrder(order.id, order.token, contentHash, order.data);
          } catch {
            // GitHub Pages no ejecuta Functions. Sellamos local para probar UX.
          }
          CVListo.updateOrder(order.id, { status: "generated", generated: true, generatedAt: new Date().toISOString() });
          window.location.href = `./descargar.html?order=${order.id}&token=${order.token}`;
        });
      }

      loadPreview();
    </script>
  </body>
</html>
