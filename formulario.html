<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulario | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="app-layout single">
        <div>
          <p class="eyebrow">Formulario guiado</p>
          <h1>Completá tus datos</h1>
          <p class="lead">Estos datos se usan para armar la vista previa. Los campos como DNI, teléfono o dirección son opcionales y podés elegir si se muestran en el CV.</p>
        </div>

        <form class="app-form wide" id="resume-form">
          <div class="form-grid">
            <label>
              Nombre completo *
              <input type="text" name="fullName" required />
            </label>
            <label>
              Puesto o rubro objetivo *
              <input type="text" name="targetRole" required />
            </label>
            <label>
              Email
              <input type="email" name="email" />
              <span class="toggle-row"><input type="checkbox" name="showEmail" checked /> Mostrar en el CV</span>
            </label>
            <label>
              Teléfono / WhatsApp
              <input type="tel" name="phone" />
              <span class="toggle-row"><input type="checkbox" name="showPhone" checked /> Mostrar en el CV</span>
            </label>
            <label>
              DNI
              <input type="text" name="dni" />
              <span class="toggle-row"><input type="checkbox" name="showDni" /> Mostrar en el CV</span>
            </label>
            <label>
              Dirección o zona
              <input type="text" name="address" />
              <span class="toggle-row"><input type="checkbox" name="showAddress" /> Mostrar en el CV</span>
            </label>
            <label>
              LinkedIn o portfolio
              <input type="url" name="linkedin" />
            </label>
            <label>
              Localidad / provincia
              <input type="text" name="location" />
            </label>
          </div>

          <label>
            Resumen o perfil
            <textarea name="summary" rows="3" placeholder="Contá brevemente qué tipo de perfil querés mostrar"></textarea>
          </label>
          <label>
            Experiencia laboral o informal
            <textarea name="experience" rows="5" placeholder="Puestos, empresas, tareas, logros, changas o proyectos"></textarea>
          </label>
          <label>
            Educación y cursos
            <textarea name="education" rows="3" placeholder="Estudios, instituciones, cursos o certificaciones"></textarea>
          </label>
          <label>
            Habilidades
            <textarea name="skills" rows="3" placeholder="Herramientas, idiomas, oficios, atención al cliente, ventas, etc."></textarea>
          </label>
          <label class="focused-only">
            Empresa objetivo
            <input type="text" name="targetCompany" placeholder="Opcional: nombre de la empresa" />
          </label>
          <label class="focused-only">
            Aviso laboral o requisitos del puesto
            <textarea name="jobAd" rows="4" placeholder="Para el plan Enfocado: pegá el texto del aviso o sus requisitos"></textarea>
          </label>
          <label class="consent">
            <input type="checkbox" name="consent" required />
            Acepto que mis datos se procesen para generar este CV y entiendo que debo revisar la vista previa antes de la generación final.
          </label>
          <button type="submit">Ver vista previa</button>
        </form>
      </section>
    </main>
    <script src="./app.js"></script>
    <script>
      const orderId = CVListo.getParam("order");
      const token = CVListo.getParam("token");
      let order = CVListo.getOrder(orderId);

      async function loadOrder() {
        if (!order && orderId && token) {
          try {
            const backendOrder = await CVListo.fetchBackendOrder(orderId, token);
            order = CVListo.cacheOrder(backendOrder);
          } catch {
            // Sin backend disponible.
          }
        }

        if (!order || order.token !== token || !["discount_test", "paid", "preview_ready"].includes(order.status)) {
          document.body.innerHTML = "<main class='app-shell'><h1>Pedido no habilitado</h1><p>Para completar el formulario, primero debe existir un pago confirmado o un código de prueba válido.</p><a class='button primary' href='./index.html#planes'>Volver</a></main>";
          return;
        }

        if (order?.planId !== "focused") {
          document.querySelector(".focused-only")?.remove();
        }

        if (order?.data) {
        const form = document.querySelector("#resume-form");
        Object.entries(order.data).forEach(([key, value]) => {
          const field = form?.elements[key];
          if (!field) return;
          if (field.type === "checkbox") {
            field.checked = value === "on";
          } else {
            field.value = value;
          }
        });
      }
      }

      loadOrder();

      document.querySelector("#resume-form")?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = CVListo.collectFormData(event.currentTarget);
        const reports = CVListo.validateResumeData(data, order.planId);
        try {
          await CVListo.saveBackendProfile(order.id, order.token, data, reports);
        } catch {
          // GitHub Pages no ejecuta Functions. Guardamos local para probar UX.
        }
        CVListo.updateOrder(order.id, { status: "preview_ready", data, reports });
        window.location.href = `./preview.html?order=${order.id}&token=${order.token}`;
      });
    </script>
  </body>
</html>
