<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="CV Listo | Generá tu CV profesional" />
    <meta property="og:description" content="Completás tus datos, pagás con Mercado Pago y descargás tu CV A4 al instante. Desde $10.000." />
    <meta property="og:image" content="https://servicio-cv.pages.dev/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://servicio-cv.pages.dev/" />
    <title>Confirmar plan | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell checkout-shell">
      <a class="back-link" href="./index.html#planes">← Volver a planes</a>
      <section class="app-layout checkout-layout">
        <div class="checkout-copy">
          <p class="eyebrow">Confirmación</p>
          <h1>Confirmá tu plan</h1>
          <p class="lead">Revisá el plan elegido y completá el email para crear el pedido. Luego se habilitará el pago o el acceso de prueba.</p>
          <form class="app-form checkout-form" id="checkout-form">
            <label>
              Email para el pedido
              <input type="email" name="email" placeholder="tu@email.com" required />
            </label>
            <details class="discount-details">
              <summary>¿Tenés un código de descuento?</summary>
              <label>
                Código
                <input type="text" name="discount" placeholder="Opcional" />
              </label>
            </details>
            <button class="button primary" type="submit" id="checkout-submit">Continuar al pago</button>
            <div class="payment-trust">
              <p>Pago procesado por Mercado Pago · Tus datos están protegidos</p>
              <div class="card-brands" aria-label="Medios de pago">
                <span>Visa</span><span>Mastercard</span><span>Mercado Pago</span>
              </div>
            </div>
          </form>
        </div>
        <div id="plan-summary"></div>
      </section>
    </main>
    <script src="./app.js"></script>
    <script>
      const planId = CVListo.getParam("plan") || "basic";
      CVListo.renderPlanSummary(document.querySelector("#plan-summary"), planId);
      const checkoutForm = document.querySelector("#checkout-form");
      const submitButton = document.querySelector("#checkout-submit");

      checkoutForm.discount?.addEventListener("input", (event) => {
        const code = event.currentTarget.value.trim().toUpperCase();
        submitButton.textContent = code === "TEST" ? "Continuar gratis (modo prueba)" : "Continuar al pago";
      });

      checkoutForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = CVListo.collectFormData(event.currentTarget);
        const code = (data.discount || "").trim().toUpperCase();

        try {
          const response = await fetch("/api/orders", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              planId,
              email: data.email,
              discountCode: code,
            }),
          });
          if (response.ok) {
            const result = await response.json();
            if (result.redirectUrl) {
              window.location.href = result.redirectUrl;
              return;
            }
            alert(result.message || "Pedido creado. Falta conectar Mercado Pago Checkout Pro.");
            return;
          }
        } catch {
          // GitHub Pages no ejecuta Functions. Usamos fallback local para probar UX.
        }

        const order = CVListo.createOrder(planId, code === "TEST" ? "discount_test" : "payment_pending");
        CVListo.updateOrder(order.id, {
          email: data.email,
          discountCode: code || null,
        });

        if (code === "TEST") {
          window.location.href = `./formulario.html?order=${order.id}&token=${order.token}`;
          return;
        }

        alert("Todavía falta configurar Mercado Pago. Para probar el flujo, usá el código de prueba.");
      });
    </script>
  </body>
</html>
