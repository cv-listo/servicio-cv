<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell admin-shell">
      <section class="app-card admin-login-card" id="admin-login-card">
        <p class="eyebrow">Admin</p>
        <h1>Pedidos CV Listo</h1>
        <p>Ingresá con tu usuario y contraseña para acceder al panel de pedidos.</p>
        <div class="checkout-error" id="admin-login-error" hidden></div>
        <form class="admin-login" id="admin-auth">
          <label>Usuario<input type="text" name="user" autocomplete="username" required /></label>
          <label>Contraseña<input type="password" name="password" autocomplete="current-password" required /></label>
          <button class="button primary" type="submit">Entrar</button>
        </form>
      </section>

      <section class="admin-grid" id="admin-content" hidden>
        <aside class="app-card">
          <div class="admin-filters">
            <select id="filter-status">
              <option value="">Todos</option>
              <option value="paid">Pagados</option>
              <option value="payment_pending">Pendientes</option>
              <option value="preview_ready">Vista previa</option>
              <option value="generated">Generados</option>
              <option value="discount_test">TEST</option>
            </select>
            <select id="filter-plan">
              <option value="">Todos los planes</option>
              <option value="basic">Básico</option>
              <option value="professional">Profesional</option>
              <option value="focused">Enfocado</option>
            </select>
            <input id="filter-email" type="search" placeholder="Buscar email" />
            <button class="button secondary" type="button" id="cleanup-pending">Cancelar pendientes viejos</button>
          </div>
          <div id="orders-list" class="orders-list"></div>
          <div class="admin-pagination">
            <button class="button secondary" type="button" id="admin-prev">Anterior</button>
            <span id="admin-page-info">Página 1</span>
            <button class="button secondary" type="button" id="admin-next">Siguiente</button>
          </div>
        </aside>
        <section class="app-card admin-detail" id="order-detail">
          <p>Seleccioná un pedido para ver el detalle.</p>
        </section>
      </section>
    </main>

    <script>
      let adminUser = "";
      let adminPassword = "";

      const authForm = document.querySelector("#admin-auth");
      const content = document.querySelector("#admin-content");
      const ordersList = document.querySelector("#orders-list");
      const detail = document.querySelector("#order-detail");
      const statusFilter = document.querySelector("#filter-status");
      const planFilter = document.querySelector("#filter-plan");
      const emailFilter = document.querySelector("#filter-email");
      const prevButton = document.querySelector("#admin-prev");
      const nextButton = document.querySelector("#admin-next");
      const pageInfo = document.querySelector("#admin-page-info");
      const pageSize = 50;
      let currentOffset = 0;
      let currentTotal = 0;

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        adminUser = authForm.user.value.trim();
        adminPassword = authForm.password.value;
        const ok = await loadOrders();
        if (ok) {
          document.querySelector("#admin-login-card").hidden = true;
          content.hidden = false;
        }
      });

      statusFilter.addEventListener("change", loadOrders);
      planFilter.addEventListener("change", loadOrders);
      emailFilter.addEventListener("input", debounce(() => {
        currentOffset = 0;
        loadOrders();
      }, 350));
      document.querySelector("#cleanup-pending").addEventListener("click", runCleanup);
      prevButton.addEventListener("click", () => {
        currentOffset = Math.max(0, currentOffset - pageSize);
        loadOrders();
      });
      nextButton.addEventListener("click", () => {
        currentOffset += pageSize;
        loadOrders();
      });

      async function adminFetch(path) {
        const url = new URL(path, window.location.origin);
        const response = await fetch(url, {
          headers: {
            authorization: `Basic ${btoa(`${adminUser}:${adminPassword}`)}`,
          },
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Error admin");
        return data;
      }

      async function adminPost(path) {
        const url = new URL(path, window.location.origin);
        const response = await fetch(url, {
          method: "POST",
          headers: {
            authorization: `Basic ${btoa(`${adminUser}:${adminPassword}`)}`,
          },
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Error admin");
        return data;
      }

      async function runCleanup() {
        if (!confirm("Esto marcará como cancelados los pedidos pendientes de pago de más de 7 días. ¿Continuar?")) return;
        try {
          const result = await adminPost("/api/admin/cleanup?days=7");
          alert(`Pedidos actualizados: ${result.changed}`);
          loadOrders();
        } catch (error) {
          alert(error.message || "No se pudo limpiar pedidos pendientes.");
        }
      }

      async function loadOrders() {
        ordersList.innerHTML = "<p class='form-note'>Cargando pedidos...</p>";
        try {
          const params = new URLSearchParams();
          if (statusFilter.value) params.set("status", statusFilter.value);
          if (planFilter.value) params.set("plan", planFilter.value);
          if (emailFilter.value) params.set("email", emailFilter.value);
          params.set("limit", pageSize);
          params.set("offset", currentOffset);
          const data = await adminFetch(`/api/admin/orders?${params.toString()}`);
          currentTotal = data.total || 0;
          ordersList.innerHTML = data.orders.map(renderOrderRow).join("") || "<p>No hay pedidos.</p>";
          renderPagination();
          ordersList.querySelectorAll("button[data-order]").forEach((button) => {
            button.addEventListener("click", () => loadOrder(button.dataset.order));
          });
          return true;
        } catch (error) {
          if (error.message === "No autorizado") {
            const loginError = document.querySelector("#admin-login-error");
            loginError.textContent = "Usuario o contraseña incorrectos.";
            loginError.hidden = false;
            content.hidden = true;
          }
          ordersList.innerHTML = `<p class="audit critical">${escapeHtml(error.message)}</p>`;
          return false;
        }
      }

      function renderPagination() {
        const currentPage = Math.floor(currentOffset / pageSize) + 1;
        const totalPages = Math.max(1, Math.ceil(currentTotal / pageSize));
        pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;
        prevButton.disabled = currentOffset === 0;
        nextButton.disabled = currentOffset + pageSize >= currentTotal;
      }

      async function loadOrder(id) {
        detail.innerHTML = "<p class='form-note'>Cargando detalle...</p>";
        try {
          const data = await adminFetch(`/api/admin/orders/${encodeURIComponent(id)}`);
          detail.innerHTML = renderOrderDetail(data);
        } catch (error) {
          detail.innerHTML = `<p class="audit critical">${escapeHtml(error.message)}</p>`;
        }
      }

      function renderOrderRow(order) {
        return `
          <button class="order-row status-${escapeHtml(order.status || "unknown")}" type="button" data-order="${escapeHtml(order.id)}">
            <strong>${escapeHtml(order.email || "Sin email")}</strong>
            <span>${escapeHtml(order.plan_id)} · ${escapeHtml(order.status)} · $${escapeHtml(order.amount)}</span>
            <small>${escapeHtml(order.created_at || "")}</small>
          </button>
        `;
      }

      function renderOrderDetail(data) {
        const order = data.order;
        return `
          <div class="admin-detail-head">
            <div>
              <p class="eyebrow">${escapeHtml(order.status)}</p>
              <h2>${escapeHtml(order.email || "Pedido sin email")}</h2>
              <p>${escapeHtml(order.id)}</p>
            </div>
            <strong>$${escapeHtml(order.amount)} · ${escapeHtml(order.plan_id)}</strong>
          </div>
          ${renderLinkTools(data.links, order)}
          ${renderSummary(order)}
          ${renderHumanProfile(order.data_json)}
          ${renderJsonBlock("Datos cargados", order.data_json)}
          ${renderJsonBlock("CV final", order.cv_json)}
          ${renderTable("Eventos Mercado Pago", data.mp_events)}
          ${renderTable("Auditorías", data.audits)}
          ${renderTable("IA", data.ai_generations)}
          ${renderTable("Documentos finales", data.final_documents)}
        `;
      }

      function renderLinkTools(links, order) {
        const primary = order.status === "generated"
          ? { label: "Copiar link de descarga", url: links.descarga }
          : order.status === "preview_ready"
            ? { label: "Copiar link de vista previa", url: links.preview }
            : { label: "Copiar link para continuar", url: links.formulario };
        return `
          <div class="admin-link-tools">
            <a class="button secondary" href="${links.formulario}" target="_blank">Formulario</a>
            <a class="button secondary" href="${links.preview}" target="_blank">Preview</a>
            <a class="button secondary" href="${links.descarga}" target="_blank">Descarga</a>
            <button class="button primary" type="button" onclick="copyAdminLink('${escapeJs(primary.url)}')">${escapeHtml(primary.label)}</button>
            <button class="button secondary" type="button" onclick="copyClientMessage('${escapeJs(order.email || "")}', '${escapeJs(primary.url)}')">Copiar mensaje para cliente</button>
          </div>
        `;
      }

      function renderSummary(order) {
        return `
          <div class="admin-summary">
            <span>MP: ${escapeHtml(order.mp_status || "-")}</span>
            <span>Pago: ${escapeHtml(order.mp_payment_id || "-")}</span>
            <span>Pagado: ${escapeHtml(order.paid_at || "-")}</span>
            <span>Generado: ${escapeHtml(order.generated_at || "-")}</span>
          </div>
        `;
      }

      function renderHumanProfile(data) {
        const experiences = data.experiences?.length ? data.experiences : [{
          place: data.experiencePlace,
          role: data.experienceRole,
          startMonth: data.startMonth,
          startYear: data.startYear,
          endMonth: data.endMonth,
          endYear: data.endYear,
          isCurrent: data.isCurrent,
          tasks: data.experience,
        }].filter((item) => item.place || item.role || item.tasks);
        return `
          <section class="admin-readable">
            <h3>Formulario cargado</h3>
            <div class="readable-grid">
              ${readableCard("Datos personales", [
                ["Nombre", data.fullName],
                ["Email", data.email],
                ["Teléfono", data.phone],
                ["DNI", data.dni],
                ["Dirección", data.address],
                ["Localidad", data.location],
                ["LinkedIn/portfolio", data.linkedin],
              ])}
              ${readableCard("Objetivo laboral", [
                ["Área", data.targetArea],
                ["Puesto objetivo", data.targetRole],
                ["Modalidad", data.modality],
                ["Disponibilidad", data.availability],
                ["Resumen", data.summary],
              ])}
              ${readableCard("Educación y habilidades", [
                ["Nivel educativo", data.educationLevel],
                ["Estado", data.educationStatus],
                ["Educación/cursos", data.education || (data.educationItems || []).map((item) => item.text).join("\\n")],
                ["Habilidades", data.skills],
              ])}
            </div>
            <div class="readable-card full">
              <h4>Experiencia</h4>
              ${experiences.length
                ? experiences.map((item, index) => `
                  <article class="readable-experience">
                    <strong>${index + 1}. ${escapeHtml([item.role, item.place].filter(Boolean).join(" · ") || "Experiencia")}</strong>
                    <span>${escapeHtml([item.startMonth, item.startYear].filter(Boolean).join("/") || "Inicio sin fecha")} - ${escapeHtml(item.isCurrent === "on" ? "Actualidad" : [item.endMonth, item.endYear].filter(Boolean).join("/") || "Sin fecha de fin")}</span>
                    ${item.tasks ? `<p>${escapeHtml(item.tasks).replaceAll("\\n", "<br />")}</p>` : ""}
                  </article>
                `).join("")
                : `<p class="muted">No hay experiencia cargada.</p>`}
              ${data.informalExperience ? `<article class="readable-experience"><strong>Experiencia práctica</strong><p>${escapeHtml(data.informalExperience).replaceAll("\\n", "<br />")}</p></article>` : ""}
            </div>
          </section>
        `;
      }

      function readableCard(title, rows) {
        const visibleRows = rows.filter(([, value]) => String(value || "").trim());
        return `
          <div class="readable-card">
            <h4>${escapeHtml(title)}</h4>
            ${visibleRows.length
              ? visibleRows.map(([label, value]) => `<p><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value).replaceAll("\\n", "<br />")}</p>`).join("")
              : `<p class="muted">Sin datos cargados.</p>`}
          </div>
        `;
      }

      function renderJsonBlock(title, value) {
        return `<details class="admin-json"><summary>${title}</summary><pre>${escapeHtml(JSON.stringify(value || {}, null, 2))}</pre></details>`;
      }

      function renderTable(title, rows) {
        return `<details class="admin-json"><summary>${title} (${rows?.length || 0})</summary><pre>${escapeHtml(JSON.stringify(rows || [], null, 2))}</pre></details>`;
      }

      function debounce(fn, wait) {
        let timeout;
        return () => {
          clearTimeout(timeout);
          timeout = setTimeout(fn, wait);
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeJs(value) {
        return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
      }

      async function copyAdminLink(url) {
        await navigator.clipboard?.writeText(url);
        alert("Link copiado.");
      }

      async function copyClientMessage(email, url) {
        const message = `Hola${email ? ` ${email}` : ""}, te compartimos el enlace para continuar o recuperar tu pedido de CV Listo:\n\n${url}\n\nSi tenés algún problema, escribinos a soporte@cvlisto.com.ar.`;
        await navigator.clipboard?.writeText(message);
        alert("Mensaje copiado.");
      }
    </script>
  </body>
</html>
