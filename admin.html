<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell admin-shell">
      <section class="app-card">
        <p class="eyebrow">Admin</p>
        <h1>Pedidos CV Listo</h1>
        <p>Consultá pagos, formularios parciales, CV final, eventos Mercado Pago y uso de IA.</p>
        <form class="admin-auth" id="admin-auth">
          <label>Token admin<input type="password" name="token" placeholder="ADMIN_TOKEN" required /></label>
          <button class="button primary" type="submit">Entrar</button>
        </form>
      </section>

      <section class="admin-grid" id="admin-content" hidden>
        <aside class="app-card">
          <div class="admin-filters">
            <select id="filter-status">
              <option value="">Todos</option>
              <option value="paid">Pagados</option>
              <option value="payment_pending">Pendientes</option>
              <option value="preview_ready">Vista previa</option>
              <option value="generated">Generados</option>
              <option value="discount_test">TEST</option>
            </select>
            <input id="filter-email" type="search" placeholder="Buscar email" />
          </div>
          <div id="orders-list" class="orders-list"></div>
        </aside>
        <section class="app-card admin-detail" id="order-detail">
          <p>Seleccioná un pedido para ver el detalle.</p>
        </section>
      </section>
    </main>

    <script>
      let adminToken = localStorage.getItem("cvListoAdminToken") || "";

      const authForm = document.querySelector("#admin-auth");
      const content = document.querySelector("#admin-content");
      const ordersList = document.querySelector("#orders-list");
      const detail = document.querySelector("#order-detail");
      const statusFilter = document.querySelector("#filter-status");
      const emailFilter = document.querySelector("#filter-email");

      if (adminToken) {
        authForm.token.value = adminToken;
        content.hidden = false;
        loadOrders();
      }

      authForm.addEventListener("submit", (event) => {
        event.preventDefault();
        adminToken = authForm.token.value.trim();
        localStorage.setItem("cvListoAdminToken", adminToken);
        content.hidden = false;
        loadOrders();
      });

      statusFilter.addEventListener("change", loadOrders);
      emailFilter.addEventListener("input", debounce(loadOrders, 350));

      async function adminFetch(path) {
        const url = new URL(path, window.location.origin);
        url.searchParams.set("token", adminToken);
        const response = await fetch(url);
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Error admin");
        return data;
      }

      async function loadOrders() {
        ordersList.innerHTML = "<p class='form-note'>Cargando pedidos...</p>";
        try {
          const params = new URLSearchParams();
          if (statusFilter.value) params.set("status", statusFilter.value);
          if (emailFilter.value) params.set("email", emailFilter.value);
          const data = await adminFetch(`/api/admin/orders?${params.toString()}`);
          ordersList.innerHTML = data.orders.map(renderOrderRow).join("") || "<p>No hay pedidos.</p>";
          ordersList.querySelectorAll("button[data-order]").forEach((button) => {
            button.addEventListener("click", () => loadOrder(button.dataset.order));
          });
        } catch (error) {
          ordersList.innerHTML = `<p class="audit critical">${escapeHtml(error.message)}</p>`;
        }
      }

      async function loadOrder(id) {
        detail.innerHTML = "<p class='form-note'>Cargando detalle...</p>";
        try {
          const data = await adminFetch(`/api/admin/orders/${encodeURIComponent(id)}`);
          detail.innerHTML = renderOrderDetail(data);
        } catch (error) {
          detail.innerHTML = `<p class="audit critical">${escapeHtml(error.message)}</p>`;
        }
      }

      function renderOrderRow(order) {
        return `
          <button class="order-row" type="button" data-order="${escapeHtml(order.id)}">
            <strong>${escapeHtml(order.email || "Sin email")}</strong>
            <span>${escapeHtml(order.plan_id)} · ${escapeHtml(order.status)} · $${escapeHtml(order.amount)}</span>
            <small>${escapeHtml(order.created_at || "")}</small>
          </button>
        `;
      }

      function renderOrderDetail(data) {
        const order = data.order;
        return `
          <div class="admin-detail-head">
            <div>
              <p class="eyebrow">${escapeHtml(order.status)}</p>
              <h2>${escapeHtml(order.email || "Pedido sin email")}</h2>
              <p>${escapeHtml(order.id)}</p>
            </div>
            <strong>$${escapeHtml(order.amount)} · ${escapeHtml(order.plan_id)}</strong>
          </div>
          <div class="admin-links">
            <a class="button secondary" href="${data.links.formulario}" target="_blank">Formulario</a>
            <a class="button secondary" href="${data.links.preview}" target="_blank">Preview</a>
            <a class="button secondary" href="${data.links.descarga}" target="_blank">Descarga</a>
          </div>
          ${renderSummary(order)}
          ${renderJsonBlock("Datos cargados", order.data_json)}
          ${renderJsonBlock("CV final", order.cv_json)}
          ${renderTable("Eventos Mercado Pago", data.mp_events)}
          ${renderTable("Auditorías", data.audits)}
          ${renderTable("IA", data.ai_generations)}
          ${renderTable("Documentos finales", data.final_documents)}
        `;
      }

      function renderSummary(order) {
        return `
          <div class="admin-summary">
            <span>MP: ${escapeHtml(order.mp_status || "-")}</span>
            <span>Pago: ${escapeHtml(order.mp_payment_id || "-")}</span>
            <span>Pagado: ${escapeHtml(order.paid_at || "-")}</span>
            <span>Generado: ${escapeHtml(order.generated_at || "-")}</span>
          </div>
        `;
      }

      function renderJsonBlock(title, value) {
        return `<details class="admin-json"><summary>${title}</summary><pre>${escapeHtml(JSON.stringify(value || {}, null, 2))}</pre></details>`;
      }

      function renderTable(title, rows) {
        return `<details class="admin-json"><summary>${title} (${rows?.length || 0})</summary><pre>${escapeHtml(JSON.stringify(rows || [], null, 2))}</pre></details>`;
      }

      function debounce(fn, wait) {
        let timeout;
        return () => {
          clearTimeout(timeout);
          timeout = setTimeout(fn, wait);
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
