<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="CV Listo | Generá tu CV profesional en minutos" />
    <meta property="og:description" content="Pagás, cargás tus datos y descargás tu CV A4 al instante. Desde $10.000." />
    <meta property="og:image" content="https://servicio-cv.pages.dev/og-image.png" />
    <meta property="og:url" content="https://servicio-cv.pages.dev/" />
    <title>Descargar CV | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="download-card">
        <p class="eyebrow">CV generado</p>
        <h1>Tu CV está listo</h1>
        <p>El CV final quedó generado para este pedido. Podés imprimirlo o guardarlo como PDF desde el navegador.</p>
        <div id="final-cv"></div>
        <div class="app-actions">
          <button class="button primary" onclick="window.print()">Guardar como PDF</button>
          <a class="button secondary" href="./index.html">Volver al inicio</a>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
    <script>
      const orderId = CVListo.getParam("order");
      const token = CVListo.getParam("token");
      let order = CVListo.getOrder(orderId);

      async function loadDownload() {
        if (!order && orderId && token) {
          try {
            const backendOrder = await CVListo.fetchBackendOrder(orderId, token);
            order = CVListo.cacheOrder(backendOrder);
          } catch {
            // Sin backend disponible.
          }
        }

        if (!order || order.token !== token || order.status !== "generated") {
          document.body.innerHTML = "<main class='app-shell'><h1>Descarga no disponible</h1><p>El CV final todavía no fue generado para este pedido.</p><a class='button primary' href='./index.html#planes'>Volver</a></main>";
          return;
        }

        document.querySelector("#final-cv").innerHTML = CVListo.buildResumeHtml(order.data);
      }

      loadDownload();
    </script>
  </body>
</html>
