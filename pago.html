<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="noindex,nofollow" />
    <meta property="og:title" content="CV Listo | Verificando pago" />
    <meta property="og:description" content="Estamos verificando tu pago para habilitar el formulario de CV." />
    <meta property="og:image" content="https://servicio-cv.pages.dev/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://servicio-cv.pages.dev/pago.html" />
    <title>Verificando pago | CV Listo</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell checkout-shell">
      <section class="app-card payment-status-card">
        <p class="eyebrow">Mercado Pago</p>
        <div class="payment-status-orb" id="payment-status-orb" aria-hidden="true"><span></span></div>
        <h1>Estamos verificando tu pago</h1>
        <p id="payment-status-text">Esto puede demorar unos segundos. No cierres esta pantalla.</p>
        <div class="payment-brand-row" aria-label="Pago seguro">
          <span class="mp-brand">Mercado Pago</span>
          <span>Visa</span>
          <span>Mastercard</span>
          <span>Débito</span>
        </div>
        <div class="a4-status warning" id="payment-status-box" role="status" aria-live="polite">Esperando confirmación del pago...</div>
        <div class="app-actions">
          <button class="button primary" type="button" id="retry-payment-check">Ya pagué, verificar de nuevo</button>
          <a class="button secondary" href="./retomar.html">Retomar pedido</a>
          <a class="button secondary" href="./index.html#soporte">Necesito ayuda</a>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
    <script>
      const orderId = CVListo.getParam("order");
      const tokenFromUrl = CVListo.getParam("token");
      if (orderId && tokenFromUrl) {
        sessionStorage.setItem(`cvListoToken:${orderId}`, tokenFromUrl);
        localStorage.setItem(`cvListoToken:${orderId}`, tokenFromUrl);
        window.history.replaceState(null, "", `./pago.html?order=${encodeURIComponent(orderId)}`);
      }
      const token = tokenFromUrl || sessionStorage.getItem(`cvListoToken:${orderId}`) || localStorage.getItem(`cvListoToken:${orderId}`);
      const statusBox = document.querySelector("#payment-status-box");
      const statusText = document.querySelector("#payment-status-text");
      let attempts = 0;
      const retryButton = document.querySelector("#retry-payment-check");

      async function pollPayment() {
        attempts += 1;
        if (!orderId || !token) {
          setPaymentOrb("error");
          statusBox.className = "a4-status critical";
          statusBox.textContent = "Falta información para verificar el pedido.";
          return;
        }

        try {
          const backendOrder = await CVListo.fetchBackendOrder(orderId, token);
          const order = CVListo.cacheOrder(backendOrder);
          if (["paid", "form_started", "preview_ready"].includes(order.status)) {
            setPaymentOrb("success");
            statusBox.className = "a4-status ok";
            statusBox.textContent = "Pago confirmado. Redirigiendo al formulario...";
            window.location.href = `./formulario.html?order=${order.id}&token=${order.token || token}`;
            return;
          }
          if (["payment_rejected", "payment_cancelled", "refunded", "charged_back"].includes(order.status)) {
            setPaymentOrb("error");
            statusBox.className = "a4-status critical";
            statusBox.textContent = "El pago no quedó aprobado. Podés volver a intentar o contactar soporte.";
            statusText.textContent = "Mercado Pago informó que esta operación no habilita el formulario.";
            return;
          }
          if (order.status === "generated") {
            window.location.href = `./descargar.html?order=${order.id}&token=${order.token || token}`;
            return;
          }
        } catch {
          // Si el webhook aún no actualizó D1, seguimos esperando.
        }

        if (attempts >= 20) {
          setPaymentOrb("warning");
          statusBox.className = "a4-status warning";
          statusBox.textContent = "El pago aún figura pendiente. Si ya pagaste, esperá unos minutos o contactá soporte.";
          statusText.textContent = "Mercado Pago puede demorar en confirmar algunas operaciones.";
          return;
        }

        setTimeout(pollPayment, 2500);
      }

      pollPayment();
      retryButton.addEventListener("click", () => {
        attempts = 0;
        setPaymentOrb("loading");
        statusBox.className = "a4-status warning";
        statusBox.textContent = "Consultando nuevamente con el servidor...";
        checkPaymentNow();
      });

      async function checkPaymentNow() {
        try {
          const response = await fetch("/api/payments/check", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ orderId, token }),
          });
          const result = await response.json();
          if (result.status === "paid" || result.alreadyEnabled) {
            setPaymentOrb("success");
            statusBox.className = "a4-status ok";
            statusBox.textContent = "Pago confirmado. Redirigiendo al formulario...";
            window.location.href = `./formulario.html?order=${orderId}&token=${token}`;
            return;
          }
          statusBox.textContent = result.message || "Todavía no vemos el pago aprobado. Volvé a intentar en unos segundos.";
        } catch {
          statusBox.textContent = "No pudimos consultar el pago en este momento. Intentá nuevamente.";
        }
        pollPayment();
      }

      function setPaymentOrb(state) {
        const orb = document.querySelector("#payment-status-orb");
        orb.className = `payment-status-orb ${state}`;
        orb.innerHTML = state === "success" ? "✓" : state === "error" ? "!" : state === "warning" ? "…" : "<span></span>";
      }
    </script>
  </body>
</html>
